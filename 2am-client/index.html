<!doctype html>
<html lang="ru">
	<head>
		<script>
			(function () {
				try {
					var raw = localStorage.getItem('2am-theme');
					if (!raw) return;
					var parsed = JSON.parse(raw);
					var theme = parsed && parsed.state && parsed.state.theme;
					if (theme === 'dark') document.documentElement.classList.add('dark');
					if (theme === 'light') document.documentElement.classList.remove('dark');
				} catch (e) {}
			})();
		</script>
		<meta charset="UTF-8" />
		<link
			rel="icon"
			type="image/svg+xml"
			href="/favicon.svg" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>2am-client</title>
	</head>
	<body>
		<div id="root"></div>
		<script
			type="module"
			src="/src/main.tsx"></script>
	</body>
</html>
